name: BreedGenetics CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: python -m unittest test_genetics.py

  deploy:
    needs: backend-tests  # 只有測試通過後才執行部署
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to GCP VM via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.GCP_IP }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        script: |
          # 進入專案目錄
          cd ~/PET_AI_ASSISTANT || git clone https://github.com/steve-shih/PET_AI_ASSISTANT.git ~/PET_AI_ASSISTANT
          cd ~/PET_AI_ASSISTANT
          
          # 更新程式碼
          git pull origin main
          
          # 重新啟動 Docker 服務
          docker compose down
          docker compose up -d --build