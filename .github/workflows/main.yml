name: BreedGenetics CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: python -m unittest test_genetics.py

  deploy:
    needs: backend-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to GCP VM via SSH
      uses: appleboy/ssh-action@v1.0.3  # 更新到穩定版本
      with:
        host: ${{ secrets.GCP_IP }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        script: |
          # 如果目錄不存在則 Clone，存在則 Pull
          if [ ! -d "PET_AI_ASSISTANT" ]; then
            git clone https://github.com/steve-shih/PET_AI_ASSISTANT.git
          fi
          cd PET_AI_ASSISTANT
          git fetch origin main
          git reset --hard origin/main
          
          # 正式啟動 Docker
          sudo docker compose down
          sudo docker compose up -d --build