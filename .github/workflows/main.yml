name: BreedGenetics CI/CD & AI Review (Claude)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: python -m unittest test_genetics.py

  ai-review:
    needs: backend-tests
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2
        
    - name: Get Code Changes
      id: get_diff
      run: |
        git diff HEAD^ HEAD > changes.diff
        echo "DIFF_FILE=changes.diff" >> $GITHUB_ENV

    - name: AI Code Review (Claude)
      run: |
        DIFF_CONTENT=$(cat changes.diff | head -c 20000)
        
        # 準備要發送給 Claude 的 Prompt
        PROMPT="你是一位資深的 Full-Stack 工程師。請檢閱以下這段程式碼的變更（Git Diff），找出潛在的 Bug、安全性風險或效能問題，並用繁體中文給出具體的改進建議。\n\n變更內容：\n$DIFF_CONTENT"
        
        # 轉義 JSON 文字
        SAFE_PROMPT=$(echo "$PROMPT" | jq -aRs .)

        # 呼叫 Anthropic Claude API
        curl -s -X POST "https://api.anthropic.com/v1/messages" \
             -H "x-api-key: ${{ secrets.CLAUDE_API_KEY }}" \
             -H "anthropic-version: 2023-06-01" \
             -H "content-type: application/json" \
             -d "{
               \"model\": \"claude-3-5-sonnet-20240620\",
               \"max_tokens\": 2048,
               \"messages\": [{
                 \"role\": \"user\",
                 \"content\": $SAFE_PROMPT
               }]
             }" > result.json
        
        # 解析並顯示 Claude 的建議
        echo "=========================================="
        echo "🚀 Claude AI 程式碼檢閱建議 :"
        echo "=========================================="
        cat result.json | jq -r '.content[0].text'
        echo "=========================================="

  deploy:
    needs: [backend-tests, ai-review]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to GCP VM via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.GCP_IP }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        port: 22
        script: |
          if [ ! -d "PET_AI_ASSISTANT" ]; then
            git clone https://github.com/steve-shih/PET_AI_ASSISTANT.git
          fi
          cd PET_AI_ASSISTANT
          git fetch origin main
          git reset --hard origin/main
          docker-compose down || true
          docker-compose up -d --build