name: BreedGenetics CI/CD & AI Review (Claude)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main", "feature/full-deployment" ]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Run tests
      run: python -m unittest test_genetics.py

  ai-review:
    needs: backend-tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 獲取所有歷史以確保 diff 正常
        
    - name: Get Code Changes
      id: get_diff
      run: |
        # 根據如果是 PR 還是 Push 來決定比對對象
        if [ "${{ github.event_name }}" == "pull_request" ]; then
          git diff origin/${{ github.base_ref }} HEAD > changes.diff
        else
          git diff HEAD~1 HEAD > changes.diff || echo "First commit, no diff" > changes.diff
        fi
        echo "DIFF_FILE=changes.diff" >> $GITHUB_ENV

    - name: AI Code Review (Claude)
      env:
        CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      run: |
        if [ -z "$CLAUDE_API_KEY" ]; then
          echo "❌ 錯誤：找不到 CLAUDE_API_KEY，請在 GitHub Secrets 中設定。"
          exit 0 # 不中斷流程，但給出提示
        fi

        # 讀取 Diff 並截斷以防超過 tokens 限制
        DIFF_CONTENT=$(cat changes.diff | head -c 15000)
        
        # 使用 jq 安全地建構 JSON 請求
        jq -n --arg diff "$DIFF_CONTENT" \
          --arg prompt "你是一位資深的 Full-Stack 工程師。請檢閱以下這段程式碼的變更（Git Diff），找出潛在的 Bug、安全性風險或效能問題，並用繁體中文給出具體的改進建議。\n\n變更內容：\n" \
          '{
            model: "claude-3-5-sonnet-20240620",
            max_tokens: 2048,
            messages: [{
              role: "user",
              content: ($prompt + $diff)
            }]
          }' > payload.json

        # 呼叫 API 並獲取回應
        curl -s -X POST "https://api.anthropic.com/v1/messages" \
             -H "x-api-key: $CLAUDE_API_KEY" \
             -H "anthropic-version: 2023-06-01" \
             -H "content-type: application/json" \
             -d @payload.json > result.json
        
        # 檢查是否含有錯誤訊息
        ERROR_MSG=$(cat result.json | jq -r '.error.message // empty')
        if [ ! -z "$ERROR_MSG" ]; then
          echo "❌ Claude API 報錯: $ERROR_MSG"
          exit 0
        fi

        echo "=========================================="
        echo "🚀 Claude AI 程式碼檢閱建議 :"
        echo "=========================================="
        cat result.json | jq -r '.content[0].text'
        echo "=========================================="

  deploy:
    needs: [backend-tests, ai-review]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
    - name: Deploy to GCP VM via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.GCP_IP }}
        username: ${{ secrets.GCP_USERNAME }}
        key: ${{ secrets.GCP_SSH_KEY }}
        port: 22
        script: |
          cd ~/PET_AI_ASSISTANT || exit
          git fetch origin main
          git reset --hard origin/main
          docker-compose down || true
          docker-compose up -d --build